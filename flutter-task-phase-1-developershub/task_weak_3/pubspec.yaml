name: task_weak_3
description: "A complete Flutter task management app with Firebase, Provider, and secure storage."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Firebase (latest stable)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # State Management
  provider: ^6.1.4

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # UUID for unique IDs
  uuid: ^4.5.1

  # Date/Time formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/